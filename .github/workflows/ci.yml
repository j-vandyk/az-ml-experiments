name: CI

on:
  push:
    branches-ignore:
      - 'gh-pages'
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & test (Python 3.10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      # ── PEP 8: Python source files ─────────────────────────────────────────
      - name: flake8 — src/ utils/ tools/ (PEP 8, max 88 chars)
        run: flake8 src/ utils/ tools/

      # ── PEP 8: notebook cells (max 120 chars per notebooks.instructions.md) ──
      - name: nbqa flake8 — notebooks/ (max 120 chars)
        run: |
          nbqa flake8 notebooks/ \
            --extend-ignore=E402,E501,W503,F811 \
            --max-line-length=120
        # E402: module level import not at top of file (expected in notebooks)
        # E501 at 120 is enforced by notebook structure tests
        # F811: redefinition of unused name (common in iterative notebook cells)

      # ── Structure + quality tests ──────────────────────────────────────────
      - name: pytest — notebook structure + src quality
        run: pytest tests/ -v --tb=short

      # ── PR summary annotation ──────────────────────────────────────────────
      - name: pytest with JUnit report
        if: always()
        run: |
          pytest tests/ \
            --junitxml=test-results.xml \
            --tb=short \
            -q
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
